name: Deploy Nginx

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy Nginx to Server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            
            echo "🚀 Starting Nginx deployment..."
            
            # Define paths
            INFRA_DIR="/opt/tenants-infrastructure"
            API_DIR="/opt/tenants-service"
            
            # Create infrastructure directory if it doesn't exist
            mkdir -p $INFRA_DIR
            cd $INFRA_DIR
            
            # Clone or update infrastructure repo
            if [ ! -d ".git" ]; then
              echo "📦 Cloning infrastructure repository..."
              git clone https://github.com/${{ github.repository }}.git .
            else
              echo "🔄 Updating infrastructure repository..."
              git fetch origin
              git reset --hard origin/main
              git pull origin main
            fi
            
            # Create logs directory
            mkdir -p logs/nginx
            
            # Create Docker network if it doesn't exist
            if ! docker network ls | grep -q tenants-network; then
              echo "🌐 Creating Docker network..."
              docker network create tenants-network
            fi
            
            # Connect existing API container to the network if it exists
            if docker ps -a | grep -q tenants-api; then
              echo "🔗 Connecting API container to network..."
              docker network connect tenants-network tenants-api 2>/dev/null || true
            fi
            
            # Deploy Nginx
            echo "🔧 Deploying Nginx..."
            docker compose pull nginx
            docker compose up -d nginx
            
            # Show status
            echo "✅ Deployment complete!"
            docker compose ps
            docker ps --filter "name=tenants"
            
            echo ""
            echo "📊 Nginx logs (last 20 lines):"
            docker compose logs --tail=20 nginx
