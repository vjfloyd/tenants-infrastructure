name: Deploy Nginx

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Hetzner
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Nginx image
        run: |
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          docker build -t ghcr.io/$REPO_LOWER/tenants-nginx:latest .
          docker push ghcr.io/$REPO_LOWER/tenants-nginx:latest

      - name: Copy docker-compose to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "docker-compose.yaml"
          target: "/opt/tenants-infrastructure/"
      - name: Deploy Nginx to Server
        uses: appleboy/ssh-action@v1.2.1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            
            echo "🚀 Starting Nginx deployment..."
            
            # Define paths
            INFRA_DIR="/opt/tenants-infrastructure"
            
            # Create infrastructure directory if it doesn't exist
            mkdir -p $INFRA_DIR
            cd $INFRA_DIR
            
            # Clone or update infrastructure repo
            if [ ! -d ".git" ]; then
              echo "📦 Cloning infrastructure repository..."
              git clone https://github.com/${{ github.repository }}.git .
            else
              echo "🔄 Updating infrastructure repository..."
              git fetch origin
              git reset --hard origin/main
              git pull origin main
            fi
            
            # Create logs directory
            mkdir -p logs/nginx
            
            # Create Docker network if it doesn't exist
            if ! docker network ls | grep -q tenants-network; then
              echo "🌐 Creating Docker network..."
              docker network create tenants-network
            fi
            
            # Connect existing API and Frontend containers to the network if they exist
            if docker ps -a | grep -q tenants-api; then
              echo "🔗 Connecting API container to network..."
              docker network connect tenants-network tenants-api 2>/dev/null || true
            fi
            
            if docker ps -a | grep -q tenants-frontend; then
              echo "🔗 Connecting Frontend container to network..."
              docker network connect tenants-network tenants-frontend 2>/dev/null || true
            fi
            
            # Deploy Nginx
            echo "🔧 Deploying Nginx..."
            
            # Log in to GHCR on the server
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # Convert repository name to lowercase for Docker image name
            REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
            sed -i "s|\${GITHUB_REPOSITORY}|$REPO_LOWER|g" docker-compose.yaml
            
            docker compose pull nginx
            docker compose up -d nginx
            
            # Show status
            echo "✅ Deployment complete!"
            docker compose ps
            docker ps --filter "name=tenants"
            
            echo ""
            echo "📊 Nginx logs (last 20 lines):"
            docker compose logs --tail=20 nginx
