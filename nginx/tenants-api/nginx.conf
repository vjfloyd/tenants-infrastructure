events {
    worker_connections 1024;
}

http {
    upstream tenants_api {
        # Connect to the API running on the host or in another container
        server tenants-api:4001;
        # Fallback to localhost if container name doesn't resolve
        server 127.0.0.1:4001 backup;
    }

    upstream tenants_frontend {
        server tenants-frontend:3000;
    }

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

    # NEW: Next.js application server
    server {
        listen 80;
        server_name www.vksolutionsai.com vksolutionsai.com;

        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;

        location / {
            proxy_pass http://tenants_frontend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }

        location /nginx-health {
            access_log off;
            return 200 'nginx health\n';
        }
    }

    # API server (MOVED SECOND)
    server {
        listen 80;
        server_name 178.156.219.218;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;

        # API routes
        location / {

            limit_req zone=api_limit burst=20 nodelay;
            
            proxy_pass http://tenants_api;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            
            # Timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # Health check endpoint
        location /nginx-health {
            access_log off;
            return 200 'nginx health\n';
        }

    }


}
